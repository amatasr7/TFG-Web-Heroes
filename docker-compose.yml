services:
  db:
    image: mysql:8.4
    container_name: web-heroes-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: webheroes
      MYSQL_USER: webheroes
      MYSQL_PASSWORD: webheroes
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./web-heroes
    container_name: web-heroes-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://webheroes:webheroes@db:3306/webheroes
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend-web-heroes
    container_name: web-heroes-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mysql_data:
